##############
# The Macros #
##############

[gcode_macro G32]
gcode:
  STATUS_HOMING
  SAVE_GCODE_STATE NAME=STATE_G32
  G90
  G28
  QUAD_GANTRY_LEVEL
  G28
  ##  Uncomment for for your size printer:
  #---------------------------------------
  ##  Uncomment for 350mm build
  G0 X175 Y175 Z30 F6000
  #---------------------------------------
  RESTORE_GCODE_STATE NAME=STATE_G32
  STATUS_READY

[bed_mesh]
speed: 300
horizontal_move_z: 10
#----------------------------
##	Uncomment for 350mm build
mesh_min: 10, 10
mesh_max: 330,330
#----------------------------
fade_start: 0.6
fade_end: 10.0
probe_count: 5,5
algorithm: bicubic
#relative_reference_index: ((x points * y points) - 1) / 2.

[gcode_macro PRINT_START]
variable_filament_type: "PLA"
gcode:
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("40")|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
  {% set filament_type = params.FILAMENT_TYPE|default("PLA")|upper %}
  SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=filament_type VALUE='"{filament_type}"'

  # Set fans based on filament type immediately
  {% if filament_type == "ABS" or filament_type == "ASA" %}
    SET_DISPLAY_TEXT MSG="ABS: Nevermore ON, Exhaust OFF"
    SET_FAN_SPEED FAN=nevermore SPEED=1.0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET=0
  {% elif filament_type == "PLA" %}
    SET_DISPLAY_TEXT MSG="PLA: Exhaust ON"
    SET_FAN_SPEED FAN=nevermore SPEED=0.0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET=10
  {% elif filament_type == "PETG" %}
    SET_DISPLAY_TEXT MSG="PETG: Exhaust ON"
    SET_FAN_SPEED FAN=nevermore SPEED=0.0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET=10
  {% endif %}

  # Check filament is loaded before starting
  {% if printer.toolhead.homed_axes == '' %}
  
    # Not homed yet, skip sensor check
  {% elif printer['filament_switch_sensor toolhead_filament_sensor'].filament_detected == False %}
    { action_raise_error("No filament detected! Please load filament before printing.") }
  {% endif %}

  # Start heating bed early, home at the same time
  SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
  STATUS_HEATING
  M140 S{target_bed}    # Start bed heating but don't wait

  # Home while bed is heating
  {% if printer.homed_axes != 'XYZ' %}
    STATUS_HOMING
    G28
  {% endif %}
  G90                   # Always ensure absolute positioning

  BED_MESH_CLEAR

  # ABS/ASA - wait for full bed temp and chamber soak
  {% if target_bed > 90 %}
    M106 S255
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M190 S{target_bed}
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"
    TEMPERATURE_WAIT SENSOR="temperature_fan chamber" MINIMUM={target_chamber}
    
  # PLA/PETG - just wait for bed, no long soak needed
  {% else %}
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M190 S{target_bed}
  {% endif %}

  # Heat nozzle to 150 for QGL and Z home
  SET_DISPLAY_TEXT MSG="Hotend: 150c"
  M109 S150

  # QGL and Z home
  SET_DISPLAY_TEXT MSG="Quad Gantry Level"
  STATUS_LEVELING
  quad_gantry_level
  G28 Z

  # Bed mesh
  SET_DISPLAY_TEXT MSG="Bed mesh"
  STATUS_MESHING
  bed_mesh_calibrate

  # Heat to cleaning temp first, clean, then heat to print temp
  {% if filament_type == "ABS" or filament_type == "ASA" %}
    SET_DISPLAY_TEXT MSG="Hotend: 205c (cleaning)"
    M109 S205
  {% elif filament_type == "PETG" %}
    SET_DISPLAY_TEXT MSG="Hotend: 190c (cleaning)"
    M109 S190
  {% else %}
    SET_DISPLAY_TEXT MSG="Hotend: 175c (cleaning)"
    M109 S175
  {% endif %}
  NOZZLE_SCRUB

  # Now heat to print temp
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"
  STATUS_HEATING
  G1 X{x_wait} Y{y_wait} Z15 F9000
  M107
  M109 S{target_extruder}
  SETUP_VORON_PURGE DISPLAY_PARAMETERS=1 ADAPTIVE_ENABLE=1
  SET_DISPLAY_TEXT MSG="Printer goes brr"
  
  # Cap acceleration to safe limit regardless of slicer settings
  SET_VELOCITY_LIMIT ACCEL=2200 ACCEL_TO_DECEL=1100
  STATUS_PRINTING
  G90

[gcode_macro PRINT_END]
gcode:
  M117 Print Complete...
  {% set th = printer.toolhead %}
  {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
  {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
  {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
  {% set filament_type = printer["gcode_macro PRINT_START"].filament_type|default("PLA")|upper %}

  SAVE_GCODE_STATE NAME=STATE_PRINT_END
  M400
  G92 E0
  G1 E-5.0 F1800
  TURN_OFF_HEATERS
  STATUS_COOLING
  SET_DISPLAY_TEXT MSG="Cooling down..."
  M106 S255

  {% if filament_type == "ABS" or filament_type == "ASA" %}
    SET_DISPLAY_TEXT MSG="ABS: Purging fumes..."
    SET_FAN_SPEED FAN=nevermore SPEED=1.0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET=10
    UPDATE_DELAYED_GCODE ID=filter_off DURATION=300
  {% elif filament_type == "PETG" %}
    SET_DISPLAY_TEXT MSG="PETG: Exhausting..."
    SET_FAN_SPEED FAN=nevermore SPEED=0.0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET=10
    UPDATE_DELAYED_GCODE ID=filter_off DURATION=180
  {% else %}
    SET_DISPLAY_TEXT MSG="PLA: Exhausting..."
    SET_FAN_SPEED FAN=nevermore SPEED=0.0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET=10
    UPDATE_DELAYED_GCODE ID=filter_off DURATION=120
  {% endif %}

  G90
  G0 X{x_safe} Y{y_safe} Z{z_safe} F20000
  G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600
  M107
  BED_MESH_CLEAR
  RESTORE_GCODE_STATE NAME=STATE_PRINT_END
  _FILTER_TRACKING
  STATUS_READY
  SET_DISPLAY_TEXT MSG="Ready for next print"
  M117 Ready....

[gcode_macro Nozzle_Purge]
gcode:
    M117 Nozzle Purging...
    G28
    G92 E0;
    G90
    G0 X140 Y5 F6000

    G0 Z0.4
    G91
    G1 X70 E15 F1200;
    G1 Y1
    G1 X-70 E15 F1200;
    G92 E0;

    G90
    G1 Z15.0 F600                  ;move the gantry up 15mm
    G1 X175 Y175 F3000
    G92 E0                         ;zero the extruded length again
    G1 F9000
    M117 Nozzle Purge complete...

[gcode_macro MMU_Print_Start_Slicer]
gcode:
    MMU_START_SETUP INITIAL_TOOL={initial_tool} 
    REFERENCED_TOOLS=!referenced_tools! 
    TOOL_COLORS=!colors! 
    TOOL_TEMPS=!temperatures! 
    TOOL_MATERIALS=!materials! 
    FILAMENT_NAMES=!filament_names! 
    PURGE_VOLUMES=!purge_volumes!
    MMU_START_CHECK

# Conditional G28 (home if not already homed)
[gcode_macro CG28]
gcode:
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes or "z" not in printer.toolhead.homed_axes %}
    G28
    {% endif %}
    
[gcode_macro Preheat_ABS]
gcode:
    M117 Preheating for ABS
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=100 # Set bed to 100C
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=250   # Set extruder to 250C
    SET_FAN_SPEED FAN=Nevermore SPEED=0.50

[gcode_macro Preheat_PLA]
gcode:
    M117 Preheating for PLA
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=60  # Set bed to 60C
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=200   # Set extruder to 200C
    SET_FAN_SPEED FAN=Nevermore SPEED=0.50
    SET_FAN_SPEED FAN=Exhaust SPEED=1

[gcode_macro SEARCH_VARS]
#
# SEARCH_VARS
#
# Dump the printer object so you can find variables of interest
# Credit to https://gist.github.com/mpalpha/ for the original
#
description: Dump the printer object to the console
gcode:
    {% set search = params.S|lower %}
    {% set ns = namespace() %}
    {% for item in printer  %}
        {% if ' ' in item %}
            {% set ns.path = ['printer', "['%s']" % (item), ''] %}
        {% else %}
            {% set ns.path = ['printer.', item, ''] %}   
        {% endif %} 

        {% if search in ns.path|lower %}
            { action_respond_info(ns.path|join) }
        {% endif %} 

        {% if printer[item].items() %}
            {% for childkey, child in printer[item].items() recursive %}
                {% set ns.path = ns.path[:loop.depth|int + 1] %}

                {% if ' ' in childkey %}
                    {% set null = ns.path.append("['%s']" % (childkey)) %}
                {% else %}
                    {% set null = ns.path.append(".%s" % (childkey)) %}
                {% endif %} 

                {% if child is mapping  %}
                    { loop(child.items()) }
                {% else %}
                    {% if search in ns.path|lower %}
                        { action_respond_info("%s : %s" % (ns.path|join, child)) }   
                    {% endif %} 
                {% endif %} 
                
            {% endfor %}
        {% endif %} 
    {% endfor %}
[gcode_macro _FILTER_TRACKING]
description: Add weighted print time to filter hours and check if replacement needed
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set current_hours = svv.filter_hours|default(0)|float %}
  {% set print_duration = printer.print_stats.print_duration|default(0)|float %}
  {% set filament_type = printer["gcode_macro PRINT_START"].filament_type|default("PLA")|upper %}

  # ABS/ASA ages carbon faster, count at 1.5x rate
  {% if filament_type == "ABS" or filament_type == "ASA" %}
    {% set weighted_hours = (print_duration / 3600) * 1.5 %}
  {% else %}
    {% set weighted_hours = print_duration / 3600 %}
  {% endif %}

  {% set new_hours = current_hours + weighted_hours %}
  SAVE_VARIABLE VARIABLE=filter_hours VALUE={new_hours}

  {% if new_hours >= 50 %}
    FILTER_REPLACEMENT_WARNING
  {% endif %}

[gcode_macro FILTER_REPLACEMENT_WARNING]
description: Warn user to replace carbon pellets
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set hours = svv.filter_hours|default(0)|float %}
  STOP_LED_EFFECTS
  SET_LED_EFFECT EFFECT=sb_critical_error
  SET_DISPLAY_TEXT MSG="REPLACE FILTER! {hours|round(1)}hrs"
  M117 Replace Nevermore carbon! {hours|round(1)} weighted hours used

[gcode_macro RESET_FILTER_HOURS]
description: Run this after replacing carbon pellets
gcode:
  SAVE_VARIABLE VARIABLE=filter_hours VALUE=0
  SET_DISPLAY_TEXT MSG="Filter hours reset!"
  M117 Filter timer reset to 0 hours
  STATUS_READY

[gcode_macro CHECK_FILTER_HOURS]
description: Check current filter hours
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set hours = svv.filter_hours|default(0)|float %}
  {% set filament_type = printer["gcode_macro PRINT_START"].filament_type|default("PLA")|upper %}
  SET_DISPLAY_TEXT MSG="Filter: {hours|round(1)}/50 hrs"
  M117 Nevermore hours: {hours|round(1)} / 50 (current filament: {filament_type})

[gcode_macro SLEEP_MODE]
gcode:
  SET_DISPLAY_TEXT MSG="Sleeping..."
  STATUS_STANDBY
  SET_FAN_SPEED FAN=nevermore SPEED=0
  SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET=0

[gcode_macro RESUME_FILAMENT]
description: Resume print after filament change or sensor bypass
gcode:
  SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1
  RESUME

[gcode_macro BYPASS_FILAMENT_SENSOR]
description: Temporarily bypass filament sensor if it malfunctions
gcode:
  SET_DISPLAY_TEXT MSG="Filament sensor bypassed!"
  M117 Warning: Filament sensor bypassed!
  SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0
  RESUME
  
[gcode_macro _CLIENT_VARIABLE]
description: Client variable overrides for Mainsail cancel/pause behavior
variable_park_at_cancel: True
variable_park_at_cancel_x: 175
variable_park_at_cancel_y: 350
variable_cancel_retract: 5.0
variable_user_cancel_macro: "PRINT_CANCEL_CLEANUP"
gcode:

[gcode_macro PRINT_CANCEL_CLEANUP]
gcode:
  SET_DISPLAY_TEXT MSG="Print Cancelled!"
  Let_There_Be_Light     # Turns all lights on full
  SET_FAN_SPEED FAN=nevermore SPEED=0
  SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET=0
  M107                   # Part cooling fan off
  STATUS_READY