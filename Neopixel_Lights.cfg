##########################
## enclosure effects    ##
##########################

[led_effect critical_error]
leds:
    neopixel:sb_leds #
    neopixel:my_neopixel
layers:
    strobe         1  1.5   add        (1.0,  1.0, 1.0)
    breathing      2  0     difference (0.95, 0.0, 0.0)
    static         1  0     top        (1.0,  0.0, 0.0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true

[gcode_macro STATUS_ERROR]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_critical_error

[led_effect enclosure_heating]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Slow red/orange gradient - warming up
    gradient 1.0 1.0 top (0.80, 0.00, 0.00),(0.40, 0.10, 0.00),(0.80, 0.00, 0.00)

[led_effect enclosure_cooling]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Slow blue breathing - cooling
    breathing 5 1 top (0.00, 0.00, 0.80)

[led_effect enclosure_homing]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Orange comet around enclosure - searching
    comet 0.5 1.0 top (1.00, 0.50, 0.00),(0.50, 0.25, 0.00),(0.10, 0.05, 0.00)

[led_effect enclosure_leveling]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Calm green breathing - leveling
    breathing 8 1 top (0.00, 0.60, 0.00)

[led_effect enclosure_meshing]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Purple chase - scanning
    comet 0.3 1.0 top (0.50, 0.00, 1.00),(0.25, 0.00, 0.50),(0.05, 0.00, 0.10)

[led_effect enclosure_cleaning]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Blue chase - cleaning
    comet 0.2 1.0 top (0.00, 0.20, 1.00),(0.00, 0.10, 0.50),(0.00, 0.00, 0.10)

[led_effect enclosure_printing]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Dim white static - subtle working light
    static 1.0 1.0 top (0.60, 0.60, 0.60)

[led_effect enclosure_ready]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Slow green breathing - ready
    breathing 8 1 top (0.00, 0.50, 0.00)

[led_effect enclosure_standby]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Very dim red pulse - sleeping
    breathing 8 1 top (0.05, 0.00, 0.00)

[led_effect enclosure_part_ready]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    # Celebration! Green and white chase around enclosure
    comet 0.5 1.0 top (0.00, 1.00, 0.00),(1.00, 1.00, 1.00),(0.00, 0.50, 0.00)

[led_effect enclosure_work_light]
leds:
    neopixel:my_neopixel
autostart:              false
frame_rate:             24
layers:
    static 1.0 1.0 top (0.40, 0.40, 0.40)