[gcode_macro nozzle_scrub]
variable_location_bucket_rear:    True
variable_enable_purge:            True
variable_purge_len:               10
variable_purge_spd:               150
variable_purge_temp_min:          170
variable_purge_ret:                2
variable_ooze_dwell:               2
variable_brush_top:              3.5
variable_clearance_z:              5
variable_wipe_qty:                 4
variable_prep_spd_xy:          21000
variable_prep_spd_z:            3000
variable_wipe_spd_xy:          21000
variable_brush_start:             75
variable_brush_width:             52
variable_brush_front:              0
variable_brush_depth:              0
variable_bucket_left_width:       92
variable_bucket_right_width:      36
variable_bucket_gap:              22
variable_bucket_start:             0
variable_bucket_pos:               1
gcode:
  {% if "xyz" in printer.toolhead.homed_axes %}

    SAVE_GCODE_STATE NAME=nozzle_scrub
    STATUS_CLEANING
    G90

    {% set Ry = printer.configfile.config["stepper_y"]["position_max"]|float %}

    {% if enable_purge %}
      # Retract before travel to prevent oozing
      M83
      G1 E-2 F1800
      G92 E0

      G1 Z{brush_top + clearance_z} F{prep_spd_z}

      {% if location_bucket_rear %}
        G1 Y{Ry} F{prep_spd_xy}
      {% else %}
        G1 Y{brush_front + (brush_depth / 2)} F{prep_spd_xy}
      {% endif %}

      # Position for purge (fixed to left bucket)
      G1 X{bucket_start + (bucket_left_width / 2)} F{prep_spd_xy}

      {% if printer.extruder.temperature >= purge_temp_min %}
        G1 E2 F1800       # Undo retract
        G1 E{purge_len} F{purge_spd}
        G1 E-{purge_ret} F{purge_spd * 5}
        G4 P{ooze_dwell * 1000}
        G92 E0
      {% endif %}
    {% endif %}

    # Travel to brush start with z clearance
    G1 Z{brush_top + clearance_z} F{prep_spd_z}
    G1 X{brush_start} F{prep_spd_xy}

    {% if location_bucket_rear %}
      G1 Y{Ry}
    {% else %}
      G1 Y{brush_front + (brush_depth / 2)}
    {% endif %}

    G1 Z{brush_top} F{prep_spd_z}

    # Main scrubbing wipes
    {% for wipes in range(1, wipe_qty + 1) %}
      G1 X{brush_start + brush_width} F{wipe_spd_xy}
      G1 X{brush_start} F{wipe_spd_xy}
    {% endfor %}

    # Finishing stroke - fast single wipe to flick residue into bucket
    G1 X{brush_start + brush_width} F{wipe_spd_xy}

    # Z hop away quickly to prevent pickup of residue
    G1 Z{brush_top + clearance_z} F{prep_spd_z}

    # Quick final retract to prevent dripping after clean
    M83
    G1 E-1 F1800
    G92 E0

    M117 Nozzle Cleaned!
    STATUS_READY
    RESTORE_GCODE_STATE NAME=nozzle_scrub

  {% else %}
    { action_raise_error("Please home your axes!") }
    M117 Please home first!
  {% endif %}