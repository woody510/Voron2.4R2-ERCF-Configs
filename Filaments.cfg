[gcode_macro _FILAMENT_STATE]
variable_nevermore_speed: 1.0
variable_chamber_fan_target: 10
variable_clean_temp: 175
gcode:
    # state holder only, not run directly

[gcode_macro SET_FILAMENT_TYPE]
description: Look up fan/clean-temp settings for FILAMENT= and store them for PRINT_START to read
gcode:
    {% set filament = params.FILAMENT|default("PLA")|string|upper %}
    {% if filament in ["ABS", "ASA"] %}
        {% set nevermore, chamber_target, clean_temp = 1.0, 0, 205 %}
    {% elif filament == "PETG" %}
        {% set nevermore, chamber_target, clean_temp = 0.0, 10, 190 %}
    {% elif filament == "TPU" %}
        {% set nevermore, chamber_target, clean_temp = 0.0, 10, 160 %}
    {% else %}
        {% if filament != "PLA" %}
            {action_respond_info("Unknown filament type '%s', defaulting to PLA" % filament)}
        {% endif %}
        {% set nevermore, chamber_target, clean_temp = 0.0, 10, 175 %}
    {% endif %}
    SET_FAN_SPEED FAN=nevermore SPEED={nevermore}
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber TARGET={chamber_target}
    SET_DISPLAY_TEXT MSG="{filament}: Nevermore {'ON' if nevermore > 0 else 'OFF'}, Exhaust {'ON' if chamber_target > 0 else 'OFF'}"
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=nevermore_speed VALUE={nevermore}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=chamber_fan_target VALUE={chamber_target}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=clean_temp VALUE={clean_temp}